<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin • Team & score manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #0a0817;
      color: #edeaff;
      padding: 2rem 1.5rem;
      min-height: 100vh;
      background-image: radial-gradient(circle at 30% 10%, #2b1b4e 0%, #070514 95%);
    }

    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* header */
    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2.2rem;
    }
    .admin-header h1 {
      font-weight: 600;
      font-size: 2.5rem;
      background: linear-gradient(130deg, #b49eff, #7af0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .badge {
      background: #342b5c;
      padding: 0.4rem 1.2rem;
      border-radius: 100px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #cbbdff;
      border: 1px solid #7b5dd6;
    }

    /* timer control card */
    .timer-card {
      background: linear-gradient(145deg, #221d42, #19133a);
      border: 2px solid #ffb86b;
      border-radius: 2rem;
      padding: 1.5rem 2rem;
      margin-bottom: 2rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      box-shadow: 0 0 30px rgba(255, 184, 107, 0.2);
    }
    .timer-title {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .timer-title span {
      font-size: 2rem;
      filter: drop-shadow(0 0 10px #ffb86b);
    }
    .timer-title h2 {
      font-size: 1.5rem;
      color: #ffd966;
    }
    .timer-controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1.5rem;
    }
    .timer-input-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #100b24;
      padding: 0.5rem 1rem;
      border-radius: 3rem;
      border: 1.5px solid #7f64d4;
    }
    .timer-input-group input {
      background: transparent;
      border: none;
      color: white;
      font-size: 1.2rem;
      width: 50px;
      text-align: center;
      font-weight: 700;
    }
    .timer-input-group input:focus {
      outline: none;
    }
    .timer-input-group label {
      color: #b19cff;
      font-size: 0.9rem;
    }
    .timer-display {
      font-size: 2.5rem;
      font-weight: 800;
      font-family: 'Courier New', monospace;
      background: linear-gradient(135deg, #fff2b5, #ffb86b);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 4px;
      min-width: 200px;
      text-align: center;
    }
    .timer-status {
      display: flex;
      gap: 0.5rem;
    }
    .status-badge {
      padding: 0.3rem 1rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .status-running {
      background: rgba(0, 200, 100, 0.2);
      border: 1px solid #00c864;
      color: #a0ffc0;
    }
    .status-paused {
      background: rgba(255, 180, 0, 0.2);
      border: 1px solid #ffb86b;
      color: #ffd966;
    }
    .status-stopped {
      background: rgba(255, 70, 70, 0.2);
      border: 1px solid #ff5f5f;
      color: #ffb0b0;
    }

    /* cards */
    .card {
      background: rgba(18, 14, 35, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(160, 130, 255, 0.25);
      border-radius: 2rem;
      padding: 1.8rem 2rem;
      box-shadow: 0 30px 50px -25px #000000cc, 0 0 0 1px rgba(200, 160, 255, 0.15) inset;
      margin-bottom: 2.5rem;
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: #ecd77f;
      margin-bottom: 1.8rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* form grid */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.2rem;
      align-items: end;
    }
    .input-field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .input-field label {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #b3a0ff;
    }
    .input-field input {
      background: #100b24;
      border: 1.5px solid #3a2d63;
      border-radius: 1.5rem;
      padding: 0.9rem 1.2rem;
      font-size: 1rem;
      color: white;
      transition: 0.2s;
    }
    .input-field input:focus {
      outline: none;
      border-color: #fcb36b;
      box-shadow: 0 0 0 3px rgba(255, 180, 110, 0.3);
    }
    .input-field input::placeholder {
      color: #5e508a;
    }

    .btn {
      border: none;
      font-weight: 600;
      border-radius: 2.5rem;
      padding: 0.9rem 1.8rem;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #26204b;
      color: #dad2ff;
      border: 1px solid #715bd0;
    }
    .btn-primary {
      background: linear-gradient(145deg, #9b75f0, #6d45c6);
      color: white;
      border: none;
      box-shadow: 0 12px 20px -15px #b179ff;
    }
    .btn-primary:hover {
      background: linear-gradient(145deg, #b28eff, #835de0);
      transform: translateY(-3px);
      box-shadow: 0 25px 30px -15px #b769ff;
    }
    .btn-outline {
      background: transparent;
      border: 1.5px solid #7f64d4;
      color: #e0d3ff;
    }
    .btn-outline:hover {
      background: rgba(127, 100, 212, 0.2);
      border-color: #fec182;
    }
    .btn-danger {
      background: rgba(255, 70, 70, 0.1);
      border: 1.5px solid #ff5f5f;
      color: #ffb0b0;
    }
    .btn-danger:hover {
      background: #ff4242;
      color: white;
      border-color: #ffa05e;
    }
    .btn-success {
      background: rgba(0, 200, 100, 0.2);
      border: 1.5px solid #00c864;
      color: #a0ffc0;
    }
    .btn-success:hover {
      background: #00c864;
      color: white;
    }
    .btn-warning {
      background: rgba(255, 180, 0, 0.2);
      border: 1.5px solid #ffb86b;
      color: #ffd966;
    }
    .btn-warning:hover {
      background: #ffb86b;
      color: #000;
    }

    /* search + toolbar */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .search-wrapper {
      flex: 2;
      min-width: 280px;
      position: relative;
    }
    .search-wrapper input {
      width: 100%;
      background: #15102e;
      border: 1.5px solid #524394;
      border-radius: 3rem;
      padding: 1rem 1rem 1rem 3.2rem;
      font-size: 1rem;
      color: white;
    }
    .search-wrapper input:focus {
      border-color: #fec182;
      outline: none;
    }
    .search-icon {
      position: absolute;
      left: 1.3rem;
      top: 1.1rem;
      font-size: 1.3rem;
      color: #a184f0;
    }
    .action-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    /* team grid */
    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 1.8rem;
      margin-top: 1rem;
    }
    .team-card {
      background: #19133a;
      border-radius: 2rem;
      padding: 1.8rem 1.5rem;
      border: 1px solid rgba(200, 160, 255, 0.2);
      box-shadow: 0 30px 35px -22px black;
      transition: 0.3s;
      backdrop-filter: blur(4px);
    }
    .team-card:hover {
      border-color: #fec182;
      transform: translateY(-6px);
      background: #20194a;
    }

    .team-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .team-name {
      font-size: 1.6rem;
      font-weight: 700;
      color: #fad87b;
      letter-spacing: -0.3px;
    }
    .team-index {
      background: #302759;
      padding: 0.3rem 1rem;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #c7b1ff;
    }
    .member-block {
      background: #100b25;
      border-radius: 1.5rem;
      padding: 1.2rem;
      margin: 1.2rem 0;
    }
    .member-title {
      color: #af9cf0;
      font-size: 0.8rem;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .member-names {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }
    .member-tag {
      background: #2b2353;
      border-radius: 2rem;
      padding: 0.3rem 1.2rem;
      font-size: 0.9rem;
      border: 1px solid #6c52c5;
      color: #eadaff;
    }

    .score-panel {
      background: #221d42;
      border-radius: 1.5rem;
      padding: 1.3rem;
      margin: 1.2rem 0 0.8rem;
      text-align: center;
    }
    .current-score {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ffda88, #ffb26b);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1.2;
    }
    .remaining-points {
      font-size: 0.9rem;
      color: #9f8be0;
      margin-bottom: 0.8rem;
      padding: 0.3rem;
      background: #2a1f4a;
      border-radius: 2rem;
    }
    .remaining-points span {
      color: #ffb86b;
      font-weight: 700;
      font-size: 1.1rem;
    }
    .criteria-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.6rem;
      margin: 1rem 0;
    }
    .criteria-grid input {
      background: #120e27;
      border: 1.5px solid #45397a;
      border-radius: 2rem;
      padding: 0.7rem 1rem;
      font-size: 0.9rem;
      color: white;
    }
    .criteria-grid input:focus {
      border-color: #f7b064;
      outline: none;
    }
    .criteria-grid input.error {
      border-color: #ff5f5f;
      background: rgba(255, 70, 70, 0.1);
    }
    .criteria-grid input:out-of-range {
      border-color: #ff5f5f;
    }

    .btn-small {
      padding: 0.6rem 1.2rem;
      font-size: 0.85rem;
      border-radius: 2rem;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    /* Score history */
    .score-history {
      margin-top: 1rem;
      background: #0f0b20;
      border-radius: 1rem;
      padding: 0.8rem;
    }
    .history-title {
      color: #b19cff;
      font-size: 0.8rem;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .history-entries {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .history-entries.expanded {
      max-height: 300px;
      overflow-y: auto;
    }
    .history-entry {
      background: #1a143b;
      border-radius: 0.8rem;
      padding: 0.6rem;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
      border-left: 3px solid #ffb86b;
    }
    .history-entry small {
      color: #9f8be0;
      display: block;
      margin-top: 0.2rem;
    }

    .edit-form {
      display: none;
      margin-top: 1.5rem;
      background: #0f0b20;
      border-radius: 1.5rem;
      padding: 1.2rem;
    }
    .edit-form.visible {
      display: block;
    }
    .edit-form input {
      width: 100%;
      margin-bottom: 0.8rem;
      background: #1a143b;
      border: 1.5px solid #5f47a4;
      border-radius: 2rem;
      padding: 0.8rem 1.2rem;
      color: white;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #1f1948;
      border: 2px solid #00c864;
      color: white;
      padding: 1rem 2rem;
      border-radius: 3rem;
      box-shadow: 0 10px 30px rgba(0,200,100,0.3);
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }

    .toast.error {
      border-color: #ff5f5f;
      box-shadow: 0 10px 30px rgba(255,70,70,0.3);
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      background: rgba(0,0,0,0.2);
      border-radius: 3rem;
      font-size: 1.2rem;
      color: #b4a0e0;
    }
    .footer-link {
      margin-top: 3rem;
      text-align: center;
    }
    .footer-link a {
      color: #fec182;
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1.5px solid #b172ff;
      padding-bottom: 2px;
    }

    .criteria-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 0.7rem;
      color: #b19cff;
      text-transform: uppercase;
    }

    @media (max-width: 600px) {
      .card { padding: 1.5rem; }
      .team-grid { grid-template-columns: 1fr; }
      .timer-card { flex-direction: column; align-items: flex-start; }
      .timer-controls { flex-direction: column; width: 100%; }
      .timer-input-group { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="admin-header">
      <h1>⚙️ PANEL · manage teams <span class="badge">2–4 members /team</span></h1>
      <div class="action-group">
        <button class="btn btn-outline" onclick="exportAllTeamsPDF()">📄 EXPORT ALL (PDF)</button>
        <button class="btn btn-outline" onclick="viewLeaderboard()">🏆 LEADERBOARD</button>
      </div>
    </div>

    <!-- Timer Configuration Card -->
    <div class="timer-card" id="timer">
      <div class="timer-title">
        <span>⏱️</span>
        <h2>Hackathon Timer</h2>
      </div>
      
      <div class="timer-controls">
        <div class="timer-input-group">
          <input type="number" id="timerHours" min="0" max="168" value="24">
          <label>Hours</label>
        </div>
        <div class="timer-input-group">
          <input type="number" id="timerMinutes" min="0" max="59" value="0">
          <label>Min</label>
        </div>
        <div class="timer-input-group">
          <input type="number" id="timerSeconds" min="0" max="59" value="0">
          <label>Sec</label>
        </div>
        
        <button class="btn btn-primary" onclick="setTimerDuration()">⏰ Set Timer</button>
      </div>
      
      <div class="timer-display" id="adminTimerDisplay">24:00:00</div>
      
      <div class="timer-status">
        <span class="status-badge" id="timerStatusBadge">⏸️ Paused</span>
        <button class="btn btn-success btn-small" onclick="startTimer()">▶ Start</button>
        <button class="btn btn-warning btn-small" onclick="pauseTimer()">⏸️ Pause</button>
        <button class="btn btn-danger btn-small" onclick="resetTimer()">↺ Reset</button>
      </div>
      
      <div class="timer-status" style="margin-top: 1rem;">
        <span class="status-badge" id="podiumStatusBadge">❓ Hidden</span>
        <button class="btn btn-primary btn-small" onclick="togglePodiumReveal()" id="podiumToggleBtn">👀 Reveal Top 3</button>
      </div>
    </div>

    <!-- add team card -->
    <div class="card">
      <div class="card-title">➕ Register new team</div>
      <div class="form-grid">
        <div class="input-field">
          <label>Team name *</label>
          <input id="teamName" placeholder="e.g. Byte Brigade" />
        </div>
        <div class="input-field">
          <label>Leader full name *</label>
          <input id="teamLeader" placeholder="Alex Chen" />
        </div>
        <div class="input-field" style="grid-column: span 2;">
          <label>Members (2–4 people, full names separated by commas) *</label>
          <input id="teamMembers" placeholder="Jamie Lee, Samira Khan, Taylor Wu" />
        </div>
        <div style="display: flex; align-items: end;">
          <button class="btn btn-primary" style="width:100%;" onclick="addTeam()">+ Create team</button>
        </div>
      </div>
    </div>

    <!-- toolbar -->
    <div class="toolbar">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="search" placeholder="Search by name, leader, member...">
      </div>
      <div class="action-group">
        <button class="btn btn-outline" onclick="resetAllScores()">⟲ reset scores</button>
        <button class="btn btn-outline" onclick="exportData()">📦 export JSON</button>
      </div>
    </div>

    <!-- team list -->
    <div class="team-grid" id="teamList"></div>
    <div class="empty-state" id="emptyState"></div>

    <div class="footer-link">
      <a href="leaderboard.html">← back to public leaderboard</a>
    </div>
  </div>

  <script>
    (function() {
      // global scoring configuration
      const MAX_TOTAL = 65;
      const CRITERIA_CONFIG = [
        { id: 'innovation', name: 'Innovation', max: 15 },
        { id: 'clarity', name: 'Clarity', max: 15 },
        { id: 'practicality', name: 'Practicality', max: 15 },
        { id: 'execution', name: 'Execution', max: 10 },
        { id: 'completion ', name: 'Completion ', max: 10 }
      ];

      let teams = JSON.parse(localStorage.getItem("hackTeams") || "[]");
      let expandedHistories = new Set();

      // ========== TIMER FUNCTIONALITY ==========
      let timerInterval = null;
      let timerSeconds = 24 * 60 * 60; // Default 24 hours
      let isTimerRunning = false;

      const timerDisplay = document.getElementById('adminTimerDisplay');
      const timerStatusBadge = document.getElementById('timerStatusBadge');
      const hoursInput = document.getElementById('timerHours');
      const minutesInput = document.getElementById('timerMinutes');
      const secondsInput = document.getElementById('timerSeconds');

      // Load timer state from localStorage
      function loadTimerState() {
        const saved = localStorage.getItem('hackathonTimer');
        if (saved) {
          const state = JSON.parse(saved);
          timerSeconds = state.seconds;
          isTimerRunning = state.isRunning;
          
          // Update input fields
          const hours = Math.floor(timerSeconds / 3600);
          const minutes = Math.floor((timerSeconds % 3600) / 60);
          const secs = timerSeconds % 60;
          
          hoursInput.value = hours;
          minutesInput.value = minutes;
          secondsInput.value = secs;
          
          updateTimerStatus();
          
          if (isTimerRunning) {
            startTimer();
          }
        }
        updateTimerDisplay();
      }

      // Save timer state to localStorage
      function saveTimerState() {
        const state = {
          seconds: timerSeconds,
          isRunning: isTimerRunning
        };
        if (isTimerRunning) {
          state.startTime = Date.now();
        }
        localStorage.setItem('hackathonTimer', JSON.stringify(state));
      }

      function formatTime(seconds) {
        if (seconds < 0) seconds = 0;
        const hours = Math.floor(seconds / 3600);
        const minutes = Math.floor((seconds % 3600) / 60);
        const secs = seconds % 60;
        
        return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      }

      function updateTimerDisplay() {
        timerDisplay.textContent = formatTime(timerSeconds);
        saveTimerState();
      }

      function updateTimerStatus() {
        if (isTimerRunning) {
          timerStatusBadge.textContent = '▶️ Running';
          timerStatusBadge.className = 'status-badge status-running';
        } else if (timerSeconds > 0) {
          timerStatusBadge.textContent = '⏸️ Paused';
          timerStatusBadge.className = 'status-badge status-paused';
        } else {
          timerStatusBadge.textContent = '⏹️ Ended';
          timerStatusBadge.className = 'status-badge status-stopped';
        }
      }

      // Set timer duration from inputs
      window.setTimerDuration = function() {
        const hours = parseInt(hoursInput.value) || 0;
        const minutes = parseInt(minutesInput.value) || 0;
        const seconds = parseInt(secondsInput.value) || 0;
        
        // Validate inputs
        if (hours < 0 || hours > 168) {
          showToast('Hours must be between 0 and 168', 'error');
          return;
        }
        if (minutes < 0 || minutes > 59) {
          showToast('Minutes must be between 0 and 59', 'error');
          return;
        }
        if (seconds < 0 || seconds > 59) {
          showToast('Seconds must be between 0 and 59', 'error');
          return;
        }
        
        const totalSeconds = (hours * 3600) + (minutes * 60) + seconds;
        
        if (totalSeconds === 0) {
          showToast('Timer duration cannot be zero', 'error');
          return;
        }
        
        // Pause timer if running
        if (isTimerRunning) {
          pauseTimer();
        }
        
        timerSeconds = totalSeconds;
        updateTimerDisplay();
        updateTimerStatus();
        showToast(`Timer set to ${formatTime(totalSeconds)}`);
      };

      // Timer controls
      window.startTimer = function() {
        if (timerSeconds <= 0) {
          showToast('Timer has ended. Please set a new duration.', 'error');
          return;
        }
        
        if (timerInterval) clearInterval(timerInterval);
        isTimerRunning = true;
        
        timerInterval = setInterval(() => {
          if (timerSeconds > 0) {
            timerSeconds--;
            updateTimerDisplay();
            
            // Auto-stop when reaching zero
            if (timerSeconds === 0) {
              clearInterval(timerInterval);
              isTimerRunning = false;
              updateTimerStatus();
              saveTimerState();
              showToast('🎉 HACKATHON TIME IS OVER! 🎉');
            }
          } else {
            clearInterval(timerInterval);
            isTimerRunning = false;
            updateTimerStatus();
            saveTimerState();
          }
        }, 1000);
        
        updateTimerStatus();
        saveTimerState();
        showToast('Timer started');
      };

      window.pauseTimer = function() {
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
          isTimerRunning = false;
          updateTimerStatus();
          saveTimerState();
          showToast('Timer paused');
        }
      };

      window.resetTimer = function() {
        pauseTimer();
        
        // Reset to values from input fields
        const hours = parseInt(hoursInput.value) || 0;
        const minutes = parseInt(minutesInput.value) || 0;
        const seconds = parseInt(secondsInput.value) || 0;
        
        timerSeconds = (hours * 3600) + (minutes * 60) + seconds;
        updateTimerDisplay();
        updateTimerStatus();
        showToast('Timer reset');
      };

      // ========== PODIUM REVEAL FUNCTIONALITY ==========
      let podiumRevealed = false;

      function loadPodiumState() {
        const saved = localStorage.getItem('podiumRevealed');
        if (saved !== null) {
          podiumRevealed = JSON.parse(saved);
          updatePodiumStatus();
        }
      }

      function updatePodiumStatus() {
        const badge = document.getElementById('podiumStatusBadge');
        const btn = document.getElementById('podiumToggleBtn');
        
        if (podiumRevealed) {
          badge.textContent = '👀 Revealed';
          badge.className = 'status-badge status-running';
          btn.innerHTML = '🙈 Hide Top 3';
        } else {
          badge.textContent = '❓ Hidden';
          badge.className = 'status-badge status-paused';
          btn.innerHTML = '👀 Reveal Top 3';
        }
      }

      window.togglePodiumReveal = function() {
        podiumRevealed = !podiumRevealed;
        localStorage.setItem('podiumRevealed', JSON.stringify(podiumRevealed));
        updatePodiumStatus();
        showToast(podiumRevealed ? '🎉 Top 3 teams revealed!' : '❓ Top 3 teams hidden');
      };

      // Load initial podium state
      loadPodiumState();

      // Toast notification
      function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `toast ${type === 'error' ? 'error' : ''}`;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => {
          toast.remove();
        }, 3000);
      }

      // ----- helper: validate member count -----
      function parseMembers(raw) {
        if (!raw.trim()) return [];
        return raw.split(',').map(s => s.trim()).filter(Boolean);
      }

      function saveTeams() {
        localStorage.setItem("hackTeams", JSON.stringify(teams));
        renderTeams();
      }

      // add team with validation
      window.addTeam = function() {
        const name = document.getElementById("teamName").value.trim();
        const leader = document.getElementById("teamLeader").value.trim();
        const membersRaw = document.getElementById("teamMembers").value.trim();

        if (!name || !leader || !membersRaw) {
          showToast("All fields required", "error");
          return;
        }

        const membersArr = parseMembers(membersRaw);
        if (membersArr.length < 2 || membersArr.length > 4) {
          showToast("Team must have between 2 and 4 members", "error");
          return;
        }

        if (teams.some(t => t.name.toLowerCase() === name.toLowerCase())) {
          showToast("Team name already exists", "error");
          return;
        }

        teams.push({
          name,
          leader,
          members: membersArr,
          total: 0,
          entries: [],
          timestamp: new Date().toISOString()
        });

        saveTeams();
        document.getElementById("teamName").value = "";
        document.getElementById("teamLeader").value = "";
        document.getElementById("teamMembers").value = "";
        showToast(`Team "${name}" created successfully`);
      };

      // validate single criterion value
      // validate a single criterion value against its max
      function validateCriterion(value, max) {
        if (value === '' || value === null || value === undefined) return true;
        const num = Number(value);
        if (isNaN(num)) return false;
        if (num < 0 || num > max) return false;
        return true;
      }

      // add score with strict per-criterion validation based on max values
      window.addScore = function(index) {
        // each criterion has its own max score now
        // use global config
        const criteria = CRITERIA_CONFIG;
        
        let sum = 0;
        const scores = {};
        let hasAnyValue = false;
        let hasError = false;

        for (let c of criteria) {
          const el = document.getElementById(`${c.id}-${index}`);
          if (!el) continue;
          
          const value = el.value.trim();
          
          if (value !== '') {
            hasAnyValue = true;
            
            if (!validateCriterion(value, c.max)) {
              el.classList.add('error');
              hasError = true;
              showToast(`${c.name} must be between 0 and ${c.max}`, "error");
            } else {
              el.classList.remove('error');
              const num = Number(value);
              scores[c.id] = num;
              sum += num;
            }
          } else {
            scores[c.id] = 0;
            el.classList.remove('error');
          }
        }

        if (hasError) return;

        if (!hasAnyValue) {
          showToast("Please enter at least one score", "error");
          return;
        }

        if (sum === 0) {
          showToast('At least one mark > 0 required', "error");
          return;
        }

        const currentTotal = teams[index].total || 0;
        if (currentTotal + sum > MAX_TOTAL) {
          showToast(`Cannot exceed ${MAX_TOTAL} points. Remaining: ${MAX_TOTAL - currentTotal}`, "error");
          return;
        }

        teams[index].total = currentTotal + sum;
        teams[index].entries.push({
          scores,
          total: sum,
          timestamp: new Date().toISOString()
        });

        for (let c of criteria) {
          const inp = document.getElementById(`${c.id}-${index}`);
          if (inp) inp.value = '';
        }

        saveTeams();
        showToast(`Added ${sum} points to ${teams[index].name}`);
      };

      // real-time validation on input
      window.validateInput = function(input, min, max) {
        const value = input.value.trim();
        if (value === '') {
          input.classList.remove('error');
          return;
        }
        
        const num = Number(value);
        if (isNaN(num) || num < min || num > max) {
          input.classList.add('error');
        } else {
          input.classList.remove('error');
        }
      };

      // View score history
      window.toggleHistory = function(index) {
        const historyEl = document.getElementById(`history-${index}`);
        if (expandedHistories.has(index)) {
          expandedHistories.delete(index);
          historyEl.classList.remove('expanded');
        } else {
          expandedHistories.add(index);
          historyEl.classList.add('expanded');
        }
      };

      // update team (with member count validation)
      window.updateTeam = function(index) {
        const name = document.getElementById(`edit-name-${index}`).value.trim();
        const leader = document.getElementById(`edit-leader-${index}`).value.trim();
        const membersRaw = document.getElementById(`edit-members-${index}`).value.trim();

        if (!name || !leader || !membersRaw) {
          showToast("All fields required", "error");
          return;
        }

        const membersArr = parseMembers(membersRaw);
        if (membersArr.length < 2 || membersArr.length > 4) {
          showToast("Must have 2–4 members", "error");
          return;
        }

        if (name !== teams[index].name && teams.some(t => t.name.toLowerCase() === name.toLowerCase())) {
          showToast("Team name already taken", "error");
          return;
        }

        const oldName = teams[index].name;
        teams[index].name = name;
        teams[index].leader = leader;
        teams[index].members = membersArr;
        teams[index].timestamp = new Date().toISOString();
        saveTeams();
        showToast(`Team "${oldName}" updated successfully`);
      };

      window.deleteTeam = function(index) {
        const teamName = teams[index].name;
        if (!confirm(`Delete team "${teamName}"?`)) return;
        teams.splice(index, 1);
        saveTeams();
        showToast(`Team "${teamName}" deleted`, "success");
      };

      window.resetAllScores = function() {
        if (!confirm("Reset all team scores to 0?")) return;
        teams.forEach(t => {
          t.total = 0;
          t.entries = [];
        });
        saveTeams();
        showToast("All scores reset to 0");
      };

      window.exportData = function() {
        const dataStr = JSON.stringify(teams, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `teams-backup-${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        showToast("Data exported successfully");
      };

      // Export single team PDF
      window.exportTeamPDF = function(index) {
        const team = teams[index];
        if (!team) return;

        const membersList = Array.isArray(team.members) ? team.members : [];
        const lastEntry = team.entries && team.entries.length ? team.entries[team.entries.length-1] : null;

        let reportHtml = `
          <html>
          <head><title>${team.name} - Team Report</title>
          <style>
            body { font-family: 'Inter', sans-serif; padding: 2rem; color: #112; background: #f8f6ff; }
            h1 { color: #2b1b5e; border-bottom: 2px solid #9b7eff; }
            .team-report { background: white; border-radius: 24px; padding: 1.8rem; margin: 2rem 0; }
            .team-name { font-size: 2rem; font-weight: 700; color: #4b2d9f; }
            .score-big { font-size: 2.2rem; font-weight: 800; color: #f57c5a; }
            table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
            th { background: #3f2e7a; color: white; padding: 10px; }
            td { padding: 8px; border-bottom: 1px solid #ccc9ff; }
          </style>
          </head>
          <body>
          <h1>📋 Individual Team Report</h1>
          <div class="team-report">
            <div class="team-name">${team.name}</div>
            <div><strong>Leader:</strong> ${team.leader}</div>
            <div><strong>Members:</strong> ${membersList.join(', ')}</div>
            <div class="score-big">${team.total} / ${MAX_TOTAL} pts</div>
        `;

        if (lastEntry) {
          reportHtml += `<h3>Latest Evaluation</h3><table>`;
          reportHtml += `<tr><th>Criteria</th><th>Points</th></tr>`;
          reportHtml += `<tr><td>Innovation</td><td>${lastEntry.scores.innovation}</td></tr>`;
          reportHtml += `<tr><td>Clarity</td><td>${lastEntry.scores.clarity}</td></tr>`;
          reportHtml += `<tr><td>Practicality</td><td>${lastEntry.scores.practicality}</td></tr>`;
          reportHtml += `<tr><td>Execution</td><td>${lastEntry.scores.execution}</td></tr>`;
          reportHtml += `<tr><td>Completion </td><td>${lastEntry.scores.completion }</td></tr>`;
          reportHtml += `<tr><th>Total</th><th>${lastEntry.total}</th></tr>`;
          reportHtml += `</table>`;
        }

        reportHtml += `</div></body></html>`;

        const printWindow = window.open('', '_blank');
        printWindow.document.write(reportHtml);
        printWindow.document.close();
        setTimeout(() => { printWindow.print(); }, 400);
      };

      window.exportAllTeamsPDF = function() {
        if (!teams.length) {
          showToast('No teams to export', "error");
          return;
        }

        let reportHtml = `
          <html>
          <head><title>All Teams Report</title>
          <style>
            body { font-family: 'Inter', sans-serif; padding: 2rem; color: #112; background: #f8f6ff; }
            h1 { color: #2b1b5e; border-bottom: 2px solid #9b7eff; }
            .team-report { background: white; border-radius: 24px; padding: 1.8rem; margin: 2rem 0; }
            .team-name { font-size: 2rem; font-weight: 700; color: #4b2d9f; }
            .score-big { font-size: 2.2rem; font-weight: 800; color: #f57c5a; }
            table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
            th { background: #3f2e7a; color: white; padding: 10px; }
            td { padding: 8px; border-bottom: 1px solid #ccc9ff; }
          </style>
          </head>
          <body>
          <h1>🏁 Synergia· Complete Team Report</h1>
          <div style="margin-bottom: 2rem;">generated ${new Date().toLocaleString()}</div>
        `;

        teams.forEach((team, idx) => {
          const membersList = Array.isArray(team.members) ? team.members : [];
          const lastEntry = team.entries && team.entries.length ? team.entries[team.entries.length-1] : null;

          reportHtml += `<div class="team-report">`;
          reportHtml += `<div class="team-name">${idx+1}. ${team.name}</div>`;
          reportHtml += `<div><strong>Leader:</strong> ${team.leader}</div>`;
          reportHtml += `<div><strong>Members:</strong> ${membersList.join(', ')}</div>`;
          reportHtml += `<div class="score-big">${team.total} / ${MAX_TOTAL} pts</div>`;

          if (lastEntry) {
            reportHtml += `<h4>Latest Evaluation</h4><table>`;
            reportHtml += `<tr><th>Criteria</th><th>Points</th></tr>`;
            reportHtml += `<tr><td>Innovation</td><td>${lastEntry.scores.innovation}</td></tr>`;
            reportHtml += `<tr><td>Clarity</td><td>${lastEntry.scores.clarity}</td></tr>`;
            reportHtml += `<tr><td>Practicality</td><td>${lastEntry.scores.practicality}</td></tr>`;
            reportHtml += `<tr><td>Execution</td><td>${lastEntry.scores.execution}</td></tr>`;
            reportHtml += `<tr><td>Completion </td><td>${lastEntry.scores.completion }</td></tr>`;
            reportHtml += `<tr><th>Total</th><th>${lastEntry.total}</th></tr>`;
            reportHtml += `</table>`;
            reportHtml += `<div style="margin-top:5px;">🕒 ${new Date(lastEntry.timestamp).toLocaleString()}</div>`;
          }
          reportHtml += `</div>`;
        });

        reportHtml += `</body></html>`;

        const printWindow = window.open('', '_blank');
        printWindow.document.write(reportHtml);
        printWindow.document.close();
        setTimeout(() => { printWindow.print(); }, 400);
      };

      window.viewLeaderboard = function() {
        window.location.href = 'leaderboard.html';
      };

      window.toggleEditForm = function(index) {
        document.getElementById(`edit-form-${index}`).classList.toggle('visible');
      };

      // filter teams
      function filterTeams(query) {
        const lowerQ = query.toLowerCase();
        const filtered = teams.filter(t => 
          t.name.toLowerCase().includes(lowerQ) ||
          t.leader.toLowerCase().includes(lowerQ) ||
          (Array.isArray(t.members) && t.members.some(m => m.toLowerCase().includes(lowerQ)))
        );
        renderTeams(filtered);
      }

      // render
      function renderTeams(teamsToRender = null) {
        const container = document.getElementById('teamList');
        const empty = document.getElementById('emptyState');
        const render = teamsToRender || teams;

        container.innerHTML = '';
        empty.innerHTML = '';

        if (!render.length) {
          empty.innerHTML = '<div>✨ No teams match or create your first team.</div>';
          return;
        }

        render.forEach((team, idx) => {
          const originalIndex = teams.findIndex(t => t.name === team.name);
          const membersArr = Array.isArray(team.members) ? team.members : [];
          const lastEntry = team.entries && team.entries.length ? team.entries[team.entries.length-1] : null;
          const remainingPoints = MAX_TOTAL - (team.total || 0);

          const card = document.createElement('div');
          card.className = 'team-card';
          
          // Build score history HTML
          let historyHTML = '';
          if (team.entries && team.entries.length > 0) {
            historyHTML = '<div class="score-history">';
            historyHTML += `<div class="history-title" onclick="toggleHistory(${originalIndex})">`;
            historyHTML += `📊 Score History (${team.entries.length} entries) <span>▼</span>`;
            historyHTML += `</div>`;
            historyHTML += `<div class="history-entries" id="history-${originalIndex}">`;
            
            // Show last 5 entries in reverse chronological order
            [...team.entries].reverse().slice(0, 5).forEach((entry, i) => {
              historyHTML += `<div class="history-entry">`;
              historyHTML += `<strong>+${entry.total} pts</strong> – `;
              historyHTML += `I:${entry.scores.innovation} C:${entry.scores.clarity} P:${entry.scores.practicality} E:${entry.scores.execution} Pr:${entry.scores.completion }`;
              historyHTML += `<br><small>${new Date(entry.timestamp).toLocaleString()}</small>`;
              historyHTML += `</div>`;
            });
            
            if (team.entries.length > 5) {
              historyHTML += `<div style="text-align:center; color:#9f8be0; padding:0.3rem;">...</div>`;
            }
            historyHTML += `</div></div>`;
          }

          card.innerHTML = `
            <div class="team-header">
              <span class="team-name">${team.name}</span>
              <span class="team-index">#${originalIndex+1}</span>
            </div>
            <div class="member-block">
              <div class="member-title">👤 leader</div>
              <div style="font-size:1.1rem; margin-bottom:0.8rem;">${team.leader}</div>
              <div class="member-title">🧑‍🤝‍🧑 members (${membersArr.length})</div>
              <div class="member-names">
                ${membersArr.map(m => `<span class="member-tag">${m}</span>`).join('')}
              </div>
            </div>

            <div class="score-panel">
              <div class="current-score">${team.total} pts</div>
              <div class="remaining-points">
                Remaining: <span>${remainingPoints}</span> / ${MAX_TOTAL}
              </div>
              <div class="criteria-grid">
                ${CRITERIA_CONFIG.map((c, i) => {
                  // two labels and inputs per row except last which spans two columns
                  if (i === CRITERIA_CONFIG.length - 1) {
                    return `
                <div class="criteria-label" style="grid-column: span 2;">${c.name} (0-${c.max})</div>
                <input type="number" id="${c.id}-${originalIndex}" placeholder="0-${c.max}" min="0" max="${c.max}" style="grid-column: span 2;" oninput="validateInput(this, 0, ${c.max})">
                    `;
                  }
                  // pair labels and inputs for first four
                  if (i % 2 === 0) {
                    const next = CRITERIA_CONFIG[i+1];
                    return `
                <div class="criteria-label">${c.name} (0-${c.max})</div>
                <div class="criteria-label">${next.name} (0-${next.max})</div>
                <input type="number" id="${c.id}-${originalIndex}" placeholder="0-${c.max}" min="0" max="${c.max}" oninput="validateInput(this, 0, ${c.max})">
                <input type="number" id="${next.id}-${originalIndex}" placeholder="0-${next.max}" min="0" max="${next.max}" oninput="validateInput(this, 0, ${next.max})">
                    `;
                  }
                  return '';
                }).join('')}
              </div>
              <button class="btn btn-primary btn-small" style="width:100%" onclick="addScore(${originalIndex})">➕ add marks</button>
              ${lastEntry ? `<div style="margin-top:8px;font-size:0.8rem;color:#b9a6ff;">last: +${lastEntry.total} (${new Date(lastEntry.timestamp).toLocaleString()})</div>` : ''}
            </div>

            ${historyHTML}

            <div class="actions">
              <button class="btn btn-outline btn-small" onclick="exportTeamPDF(${originalIndex})">📄 PDF</button>
              <button class="btn btn-outline btn-small" onclick="toggleEditForm(${originalIndex})">✎ edit</button>
              <button class="btn-danger btn-small" onclick="deleteTeam(${originalIndex})">🗑 delete</button>
            </div>

            <div class="edit-form" id="edit-form-${originalIndex}">
              <input type="text" id="edit-name-${originalIndex}" value="${team.name}" placeholder="team name">
              <input type="text" id="edit-leader-${originalIndex}" value="${team.leader}" placeholder="leader name">
              <input type="text" id="edit-members-${originalIndex}" value="${membersArr.join(', ')}" placeholder="full names, comma">
              <div style="display: flex; gap: 8px;">
                <button class="btn btn-primary btn-small" style="flex:1" onclick="updateTeam(${originalIndex})">save</button>
                <button class="btn btn-outline btn-small" style="flex:1" onclick="toggleEditForm(${originalIndex})">cancel</button>
              </div>
            </div>
          `;
          container.appendChild(card);
        });
      }

      document.getElementById('search').addEventListener('input', (e) => filterTeams(e.target.value));

      // Load timer state on page load
      loadTimerState();

      // Clean up timer on page unload
      window.addEventListener('beforeunload', () => {
        if (timerInterval) {
          clearInterval(timerInterval);
        }
        saveTimerState();
      });

      // initial render
      renderTeams();
    })();
  </script>
</body>
</html>
